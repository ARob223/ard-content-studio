function iso(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function parseISO(s){ const p=s.split('-').map(Number); return new Date(p[0], p[1]-1, p[2]); }
function todayISO(){ return iso(new Date()); }
function addDays(s, n){ const d=parseISO(s); d.setDate(d.getDate()+n); return iso(d); }
function mondayOf(s){ const d=parseISO(s); const wd=(d.getDay()+6)%7; d.setDate(d.getDate()-wd); return iso(d); }
function weekdayIdx(s){ return (parseISO(s).getDay()+6)%7; }
function fmtShort(s){ const d=parseISO(s); return WD[weekdayIdx(s)]+' '+MON[d.getMonth()]+' '+d.getDate(); }
function weekdayFull(s){ return WD_FULL[weekdayIdx(s)]; }

function normalizeState(){
  if(!state.items) state.items=[];
  if(!state.badges) state.badges={};
  const thisMon = mondayOf(todayISO());
  state.items.forEach(it=>{
    if(!it.date && it.day){ const idx=WD_FULL.indexOf(it.day); if(idx>=0) it.date=addDays(thisMon, idx); delete it.day; }
  });
}
async function loadState(){
  let loaded=null;
  // 1) cloud (Supabase) when signed in — this is the source of truth across devices
  if(sb && sbUser){
    try{
      const { data, error } = await sb.from('content_state').select('data').eq('user_id', sbUser.id).maybeSingle();
      if(!error && data && data.data) loaded = JSON.stringify(data.data);
    }catch(e){}
  }
  // 2) Claude artifact storage (works inside the chat)
  if(!loaded){ try{ const r=await window.storage.get(STORE_KEY); if(r&&r.value) loaded=r.value; }catch(e){} }
  // 3) browser localStorage (offline / standalone)
  if(!loaded){ try{ const ls=localStorage.getItem(STORE_KEY); if(ls) loaded=ls; }catch(e){} }
  if(loaded){ try{ state=JSON.parse(loaded); }catch(e){} }
  normalizeState();
  // Sync any already-earned badges silently (no celebration for past progress)
  const earned=computeEarned();
  let changed=false;
  Object.keys(earned).forEach(id=>{ if(earned[id] && !state.badges[id]){ state.badges[id]=todayISO(); changed=true; } });
  if(changed) await saveState();
}
async function saveState(){
  const data=JSON.stringify(state);
  let saved=false;
  // always keep a local copy (offline + instant)
  try{ localStorage.setItem(STORE_KEY, data); saved=true; }catch(e){}
  try{ await window.storage.set(STORE_KEY, data); saved=true; }catch(e){}
  // push to the cloud when signed in
  if(sb && sbUser){
    try{
      const { error } = await sb.from('content_state').upsert({ user_id: sbUser.id, data: state, updated_at: new Date().toISOString() });
      if(!error) saved=true;
      updateSyncPill(error ? 'error' : 'ok');
    }catch(e){ updateSyncPill('error'); }
  }
  if(!saved) toast('Could not save — try again');
}
function updateSyncPill(status){
  const p=document.getElementById('syncDot'); if(!p) return;
  if(status==='ok'){ p.textContent='☁ Synced'; p.style.color='var(--ok)'; }
  else if(status==='error'){ p.textContent='⚠ Sync issue'; p.style.color='var(--orange)'; }
}

function postedCards(){ return state.items.filter(i=>i.title && PLATFORMS.every(p=>i.status[p.k])); }
function titledCards(){ return state.items.filter(i=>i.title); }
function longestPostStreak(){
  const days=[...new Set(postedCards().map(i=>i.date))].sort();
  if(!days.length) return 0;
  let best=1, run=1;
  for(let i=1;i<days.length;i++){ if(addDays(days[i-1],1)===days[i]){ run++; best=Math.max(best,run);} else run=1; }
  return best;
}
function anyFullDay(){
  const byDate={}; titledCards().forEach(i=>{ (byDate[i.date]=byDate[i.date]||[]).push(i); });
  return Object.values(byDate).some(arr=>arr.length>=3 && arr.every(i=>PLATFORMS.every(p=>i.status[p.k])));
}
function anyFullWeek(){
  const byWk={}; titledCards().forEach(i=>{ const w=mondayOf(i.date); (byWk[w]=byWk[w]||[]).push(i); });
  return Object.values(byWk).some(arr=>arr.length>=3 && arr.every(i=>PLATFORMS.every(p=>i.status[p.k])));
}

function computeEarned(){ const out={}; BADGES.forEach(b=>{ try{ out[b.id]=!!b.test(); }catch(e){ out[b.id]=false; } }); return out; }
async function celebrateNewBadges(){
  const earned=computeEarned();
  const fresh=BADGES.filter(b=>earned[b.id] && !state.badges[b.id]);
  if(!fresh.length) return false;
  fresh.forEach(b=>{ state.badges[b.id]=todayISO(); });
  await saveState();
  const list=fresh.map(b=>`<div class="bdg-pop"><div class="bdg-pop-icon">${b.icon}</div><div><div class="bdg-pop-name">${b.name}</div><div class="bdg-pop-desc">${esc(b.desc)}</div></div></div>`).join('');

function itemsForDate(d){ return state.items.filter(i=>i.date===d).sort((a,b)=>a.slot-b.slot); }
function getItem(id){ return state.items.find(i=>i.id===id); }
function openSlot(date, preferred){
  const used = itemsForDate(date).filter(i=>i.title).map(i=>i.slot);
  if(!used.includes(preferred)) return preferred;
  for(const s of [1,2,3]) if(!used.includes(s)) return s;
  return null;
}

function rangeStats(dates){
  const set=new Set(dates);
  const its=state.items.filter(i=>i.title && set.has(i.date));
  let filmed=0, posted=0;
  its.forEach(i=>{ if(i.status.filmed)filmed++; if(PLATFORMS.every(p=>i.status[p.k]))posted++; });
  return {total:its.length, filmed, posted};
}

function slotCardsHTML(date){
  const items=itemsForDate(date);
  let h='';
  [1,2,3].forEach(slot=>{

    if(it){

}

        <option ${pendingIdea.hook==='name a common mistake'?'selected':''}>name a common mistake</option>
      </select></div>
    <div class="field"><label>Length</label><select id="useLen"><option>15</option><option>30</option><option selected>60</option><option>90</option></select></div>
    <div class="helper" style="margin-bottom:14px">Tapping below adds this to your plan as a draft and builds one prompt covering the <b>Reels/TikTok script, LinkedIn post, image graphic, and a B-roll shot list</b>. Paste it into a Claude chat to get the whole package back.</div>
    <button class="btn btn-primary" onclick="commitIdea()">Add to plan & copy prompt</button>
    <button class="btn btn-ghost" style="margin-top:10px" onclick="justCopyIdea()">Just copy the prompt</button>
  `);
}
function buildPrompt(ideaText, hook, len, audience){
  return `${BRAND}

I'm creating one piece of content from a single idea and repurposing it across platforms. Give me the full package below for this idea.

Idea: "${ideaText}"
Who this is for: ${audience||'All local service businesses'}
Hook style: ${hook}
Length: ~${len} seconds of spoken content

Speak directly to that audience throughout — use their world, their jobs, and the problems they actually run into.

Produce ALL of the following, with clear section headers:

=== 1. REELS / TIKTOK SCRIPT ===
SCREEN HOOK — big bold text, 1 line, all caps, stops the scroll
HOOK — first 3 seconds spoken
SCRIPT — word-for-word with [PAUSE] and [HOLD UP TEXT] cues
ON-SCREEN TEXT — 3–5 overlays, under 6 words each
CAPTION — full post copy with a soft CTA to ARD Solutions
HASHTAGS — 8–10 relevant tags

=== 2. LINKEDIN POST ===
Same idea, reworked for LinkedIn — professional but plainspoken, no fluff, no "excited to announce" energy. Use this structure:
- Open with a strong scroll-stopping line (an observation, stat, or "the new [X] in your area is..." style hook).
- Short punchy lines with line breaks between thoughts. No walls of text.
- Include a list where it fits — use dashes (–) for the bullets (e.g. what the system does, what it eliminates). Lists are expected, not optional.
- Build contrast (e.g. "No missed calls. No forgotten texts. No leads slipping through.").
- End with a direct CTA or directive in the style of "If you want to [outcome], DM me '[WORD]'. I'll show you exactly how to set this up." Only end on a thought-provoking question instead if a question genuinely fits the idea better.
- 2–3 hashtags max.

=== 3. IMAGE GRAPHIC ===
GRAPHIC TEXT — the headline, subline, and footer to put on a branded quote-card graphic sized for Instagram (vertical 4:5, 1080x1350). Use the ARD brand palette: mint green #BCFFCE, royal blue (#4169E1), black, and white. Suggest which colors go where (background, headline, accent) for strong contrast.
IMAGE PROMPT — a text-to-image prompt for a photo-based alternative. MUST be vertical portrait, 4:5 aspect ratio (1080x1350), built for Instagram. Compose it so the top half is clean negative space for the headline text overlay, with the subject in the lower portion. No text or logos in the image itself. End the prompt with "--ar 4:5, vertical portrait orientation".
CANVA NOTES — quick guidance on laying it out in Canva using a 1080x1350 (4:5) portrait canvas and the brand colors above (mint green #BCFFCE, royal blue, black, white): headline top, subline below it, footer bar with ardsolutions.net at the bottom.

=== 4. B-ROLL / VIDEO SHOT LIST ===
A shot-by-shot B-roll plan that follows the script beat by beat, so the talking-head footage can be cut over with supporting visuals. For each beat:
- SCRIPT BEAT — the line or moment from the script this shot covers (quote a few words so it's easy to match).
- SHOT — what to film or source (e.g. close-up of a phone ringing unanswered, hands working on a job, a calendar filling up). Favor simple shots an owner can capture on a phone.
- TYPE — note whether it's "film yourself," "stock/AI clip," or "screen recording."
Keep it to one shot per major beat (roughly 4–7 shots total). Also list 2–3 GENERIC B-ROLL options that work as filler over any line (e.g. tools on a workbench, driving to a job, typing on a laptop). End with a quick text-to-video PROMPT for an AI video tool that captures the overall vibe, with no text or logos in the footage.

Keep everything in the ARD voice throughout.`;
}
async function commitIdea(){

  state.items.push(it); await saveState();
  focusDate(day);

}

function renderGoals(){
  const earned=computeEarned();
  const earnedCount=BADGES.filter(b=>state.badges[b.id]).length;
  // this week progress
  const wkDates=[]; for(let i=0;i<7;i++) wkDates.push(addDays(weekStart,i));
  const wkSet=new Set(wkDates);
  const wkTitled=state.items.filter(i=>i.title && wkSet.has(i.date));
  const wkPosted=wkTitled.filter(i=>PLATFORMS.every(p=>i.status[p.k]));
  const wkPct = wkTitled.length ? Math.round(wkPosted.length/wkTitled.length*100) : 0;
  const totalPosted=postedCards().length;

  let html=`<div class="screen">
    <div class="screen-title">Goals</div>
    <div class="screen-sub">Ship content, earn badges, watch your progress stack up.</div>
    <div class="stat-row">
      <div class="stat"><div class="num">${earnedCount}</div><div class="lbl">Badges</div></div>

    </div>

      <div class="prog-track"><div class="prog-fill" style="width:${wkPct}%"></div></div>
      <div class="goal-card-note">${wkTitled.length ? `${wkPosted.length} of ${wkTitled.length} posts shipped${wkPosted.length<wkTitled.length?` — ${wkTitled.length-wkPosted.length} to go for the 🏆 Full Week badge`:` — week complete! 🎉`}` : 'No posts planned this week yet. Add some on the Plan tab.'}</div>
    </div>

    <div class="cat-head"><span class="cdot" style="background:var(--gold)"></span>Badges</div>
    <div class="badge-grid">`;
  BADGES.forEach(b=>{
    const got=!!state.badges[b.id];
    let progTxt='';
    if(!got && b.prog){ const p=b.prog(); progTxt=`${Math.min(p.c,p.t)}/${p.t}`; }

function renderTrack(){
  const items=state.items.filter(i=>i.title).sort((a,b)=> a.date<b.date?-1:a.date>b.date?1:a.slot-b.slot);
  if(!items.length){ return `<div class="screen"><div class="screen-title">Track</div>
    <div class="empty-note">Nothing to track yet.<div style="margin-top:20px"><button class="btn btn-primary" onclick="go('ideas')">Browse ideas</button></div></div></div>`; }
  let html=`<div class="screen"><div class="screen-title">Track Posting</div>
    <div class="screen-sub">Tap a post to check off filming and each platform as you publish.</div>`;
  items.forEach(it=>{ const done=PLATFORMS.filter(p=>it.status[p.k]).length;
    const dots=PLATFORMS.map(p=>`<span class="dot ${it.status[p.k]?'on '+p.cls:''}">${p.label}</span>`).join('');
    html+=`<div class="card" onclick="openTrack('${it.id}')">

  html+=`</div>`;
  return html;
}

function openImport(){ modal(`<h3>Bulk import scripts</h3>
  <div class="screen-sub" style="margin-bottom:12px">Paste multiple scripts at once. Separate each with a line containing only <b>---</b>. Use <b>DATE: YYYY-MM-DD</b> (or a weekday name for this week).</div>
  <div class="prompt-card"><div class="pc-text">DATE: ${todayISO()}<br>SLOT: 1<br>TITLE: Missed calls lose jobs<br>SCREENHOOK: THEY WERE READY TO PAY<br>HOOK: You just lost a customer...<br>SCRIPT: full script...<br>---<br>DATE: ${addDays(todayISO(),1)}<br>SLOT: 2<br>...</div></div>
  <div class="field"><textarea id="bulkBox" rows="9" placeholder="Paste here..."></textarea></div>
  <button class="btn btn-primary" onclick="runImport()">Import</button>`); }
async function runImport(){ const raw=document.getElementById('bulkBox').value.trim(); if(!raw){toast('Nothing to import');return;}
  const blocks=raw.split(/\n\s*---\s*\n/); let added=0; const thisMon=mondayOf(todayISO());
  blocks.forEach(b=>{ const get=re=>{const mm=b.match(re);return mm?mm[1].trim():'';};
    let date=get(/DATE:\s*(\d{4}-\d{2}-\d{2})/i);
    if(!date){ const dayName=get(/DAY:\s*([A-Za-z]+)/i); const idx=WD_FULL.findIndex(d=>d.toLowerCase()===dayName.toLowerCase()); if(idx>=0) date=addDays(thisMon, idx); }
    const slotR=get(/SLOT:\s*(\d)/i), title=get(/TITLE:\s*(.+)/i);
    const screen=get(/SCREENHOOK:\s*(.+)/i), hook=get(/HOOK:\s*(.+)/i);
    const sm=b.match(/SCRIPT:\s*([\s\S]+)/i); const script=sm?sm[1].trim():'';
    if(date&&title){ const slot=openSlot(date, parseInt(slotR)||1)||(parseInt(slotR)||1);
      const it=newItem(date,slot); it.title=title; it.screenHook=screen; it.hook=hook; it.script=script;
      it.status.script=!!script; it.status.screenHook=!!screen; state.items.push(it); added++; } });
  await saveState(); closeModal(); go('week'); toast(added?('Imported '+added+' script'+(added>1?'s':'')):'No valid blocks found'); }

async function doSignUp(){
  if(!sb){ toast('Sync unavailable here'); return; }
  const email=document.getElementById('authEmail').value.trim();
  const pass=document.getElementById('authPass').value;
  if(!email||pass.length<6){ toast('Enter email + 6+ char password'); return; }
  const { data, error } = await sb.auth.signUp({ email, password: pass });
  if(error){ toast(error.message); return; }
  if(data.session){ sbUser=data.user; await afterLogin(true); }
  else { toast('Check your email to confirm, then sign in'); }
}
async function doSignIn(){
  if(!sb){ toast('Sync unavailable here'); return; }
  const email=document.getElementById('authEmail').value.trim();
  const pass=document.getElementById('authPass').value;
  if(!email||!pass){ toast('Enter your email and password'); return; }
  const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });
  if(error){ toast(error.message); return; }
  sbUser=data.user; await afterLogin(false);
}
async function afterLogin(isNew){
  closeModal();
  // If this device already has local content and the cloud is empty, push it up.
  if(isNew && state.items && state.items.length){ await saveState(); }
  else { await loadState(); }
  render(); updateSyncPill('ok'); toast('Synced to your account');

  if(sb) { try{ await sb.auth.signOut(); }catch(e){} }

}

  if(sb){
